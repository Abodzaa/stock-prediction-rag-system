services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      MODELS_DIR: /app/src/artifacts
      RESEARCH_ROOT: /app/src
      MODEL_REGISTRY: /app/backend/app/model_registry.json
    volumes:
      # Trained checkpoints (kept out of the image) mounted read-only.
      - ./src/artifacts:/app/src/artifacts:ro
      
      # 💥 التعديل السحري للمساحة: إجبار الدوكر يرمي الموديلات الثقيلة في بارتشن الـ D مباشرة
      - D:\hf_cache:/app/.hf_cache
      
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  qdrant_storage:
  # 💥 شيلنا الـ hf_cache من هنا عشان ميتعملش جوه الـ C
